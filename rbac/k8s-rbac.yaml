# rbac/k8s-rbac.yaml
# DO NOT change this unless you know what you are doing
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-whisperer-agent
  namespace: production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: production
  name: k8s-whisperer-role
rules:
  # Can READ pods, events, deployments
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  # Can DELETE pods (restart = delete + K8s recreates)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  # Can READ deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # Can PATCH deployments (for OOMKilled memory fix)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-whisperer-binding
  namespace: production
subjects:
  - kind: ServiceAccount
    name: k8s-whisperer-agent
    namespace: production
roleRef:
  kind: Role
  name: k8s-whisperer-role
  apiGroup: rbac.authorization.k8s.io
