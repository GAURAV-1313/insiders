# Namespace-scoped Role — pod-level operations only, no cluster-admin
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8swhisperer-role
  namespace: production
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods/log", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "patch"]
---
# Cluster-scoped Role — read-only node access for NodeNotReady detection
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8swhisperer-node-reader
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8swhisperer-sa
  namespace: production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8swhisperer-binding
  namespace: production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: k8swhisperer-role
subjects:
- kind: ServiceAccount
  name: k8swhisperer-sa
  namespace: production
---
# Read-only node access — cannot drain, cordon, or modify nodes
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8swhisperer-node-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8swhisperer-node-reader
subjects:
- kind: ServiceAccount
  name: k8swhisperer-sa
  namespace: production
