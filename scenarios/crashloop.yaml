apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-app
  namespace: production
  labels:
    scenario: crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crash-app
  template:
    metadata:
      labels:
        app: crash-app
    spec:
      containers:
      - name: crash-container
        image: busybox:latest
        command:
        - "/bin/sh"
        - "-c"
        - "echo 'App starting...' && echo 'ERROR: Database connection refused at db:5432' && exit 1"
        resources:
          limits:
            memory: "64Mi"
            cpu: "100m"
