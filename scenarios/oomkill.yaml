apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-app
  namespace: production
  labels:
    scenario: oomkill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-app
  template:
    metadata:
      labels:
        app: oom-app
    spec:
      containers:
      - name: oom-app
        image: python:3.11-alpine
        command:
        - python
        - -c
        - |
          import time
          blocks = []
          for _ in range(70):
              blocks.append(b"x" * 1024 * 1024)
              time.sleep(0.05)
          print("allocation complete")
          while True:
              time.sleep(60)
        resources:
          requests:
            memory: "50Mi"
          limits:
            memory: "50Mi"
