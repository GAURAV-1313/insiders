apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-app
  namespace: production
  labels:
    scenario: oomkill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-app
  template:
    metadata:
      labels:
        app: oom-app
    spec:
      containers:
      - name: oom-app
        image: polinux/stress
        args: ["--vm", "1", "--vm-bytes", "100M", "--vm-hang", "1"]
        resources:
          requests:
            memory: "50Mi"
          limits:
            memory: "50Mi"
