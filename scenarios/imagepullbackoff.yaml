apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-image-app
  namespace: production
  labels:
    app: broken-image-app
    scenario: imagepullbackoff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-image-app
  template:
    metadata:
      labels:
        app: broken-image-app
    spec:
      containers:
      - name: app
        image: doesnotexist/nonexistent-image:v999
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
